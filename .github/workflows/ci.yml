name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install root dependencies
        run: npm install
      - name: Install studio-core dependencies
        run: npm install
        working-directory: packages/studio-core
      - name: Run tests
        run: npm test
        working-directory: packages/studio-core

  examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install studio-core dependencies
        run: npm install
        working-directory: packages/studio-core
      - name: Install kdna-cli for validate/pack
        run: npm install -g @aikdna/kdna-cli
      - name: Run minimal-domain example
        run: node examples/minimal-domain/run.js
      - name: Run leadership-master example
        run: node examples/leadership-master/run.js
